<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandas — Staff Check-In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4AF37;--gold-l:#F0D060;--orange:#FF6B35;
  --d:#080808;--d2:#111111;--d3:#1a1a1a;
  --w:#ffffff;--gr:#777;--grl:#bbb;
  --green:#52B788;--red:#FF4444;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--d);color:var(--w);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-x:hidden}
.bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(212,175,55,.1) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 90% 80%,rgba(255,107,53,.05) 0%,transparent 55%)}
.corner{position:fixed;width:48px;height:48px;pointer-events:none;opacity:.2}
.c-tl{top:20px;left:20px;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
.c-tr{top:20px;right:20px;border-top:1px solid var(--gold);border-right:1px solid var(--gold)}
.c-bl{bottom:20px;left:20px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold)}
.c-br{bottom:20px;right:20px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold)}
.card{position:relative;z-index:10;width:100%;max-width:400px;background:var(--d2);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:clamp(28px,5vw,44px);box-shadow:0 24px 80px rgba(0,0,0,.5)}
.card::before{content:'';position:absolute;top:0;left:16px;right:16px;height:2px;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:0 0 2px 2px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:6px;background:linear-gradient(135deg,var(--gold),var(--gold-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.logo-sub{font-size:9px;letter-spacing:5px;color:var(--gr);text-transform:uppercase;text-align:center;margin-bottom:28px}
.gold-line{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px}
.screen{display:none}
.screen.active{display:block;animation:fadeUp .5s cubic-bezier(.16,1,.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.screen-title{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,26px);font-weight:800;text-align:center;margin-bottom:8px;line-height:1.1}
.screen-sub{font-size:13px;color:var(--gr);text-align:center;margin-bottom:24px;line-height:1.6}
.tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,.04);border-radius:8px;padding:4px}
.tab{flex:1;padding:10px;border:none;background:none;color:var(--gr);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;transition:all .25s;text-align:center}
.tab.active{background:var(--d3);color:var(--w);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gr);margin-bottom:7px;font-weight:500}
.phone-row{display:flex;gap:10px}
.phone-prefix{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:14px 14px;color:var(--w);font-size:14px;white-space:nowrap;display:flex;align-items:center;gap:6px;flex-shrink:0}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:14px 16px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all .25s}
.field input::placeholder{color:#3a3a3a}
.field input:focus{border-color:rgba(212,175,55,.5);background:rgba(212,175,55,.04);box-shadow:0 0 0 3px rgba(212,175,55,.08)}
.btn{width:100%;padding:15px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;border:none;margin-top:4px}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;box-shadow:0 8px 24px rgba(212,175,55,.2)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(212,175,55,.35)}
.btn-gold:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{color:var(--red);font-size:12px;text-align:center;margin-bottom:12px;display:none}
.result-box{border-radius:10px;padding:20px;margin-bottom:20px;text-align:center}
.result-box.found{background:rgba(82,183,136,.1);border:1px solid rgba(82,183,136,.3)}
.result-box.not-found{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2)}
.result-box.error{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2)}
.result-icon{font-size:40px;margin-bottom:12px}
.result-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px}
.result-name.green{color:var(--green)}
.result-name.red{color:var(--red)}
.result-detail{font-size:13px;color:var(--gr);line-height:1.6}
.result-food{display:inline-block;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.2);border-radius:100px;padding:4px 14px;font-size:12px;color:var(--gold);margin-top:8px}
.visit-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(82,183,136,.1);border:1px solid rgba(82,183,136,.2);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--green);margin-top:10px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spinning .6s linear infinite;vertical-align:middle;margin-left:6px}
@keyframes spinning{to{transform:rotate(360deg)}}
.staff-tag{text-align:center;margin-top:20px}
.staff-tag span{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#333}
</style>
</head>
<body>

<div class="bg"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<div class="card">
  <div class="logo">DE CHOICE MALL</div>
  <div class="logo-sub">Staff Check-In</div>
  <div class="gold-line"></div>

  <!-- SCREEN 1: FORM -->
  <div class="screen active" id="screen1">
    <h2 class="screen-title">Log Customer<br>Visit</h2>
    <p class="screen-sub">Search by phone number or name to log a customer visit.</p>

    <div class="tabs">
      <button class="tab active" id="tab-phone" onclick="switchTab('phone')">📱 By Phone</button>
      <button class="tab" id="tab-name" onclick="switchTab('name')">👤 By Name</button>
    </div>

    <!-- PHONE -->
    <div id="form-phone">
      <div class="field">
        <label>WhatsApp Number</label>
        <div class="phone-row">
          <div class="phone-prefix">🇳🇬 +234</div>
          <input type="tel" id="phone-input" placeholder="08012345678" maxlength="11" autocomplete="off">
        </div>
      </div>
    </div>

    <!-- NAME -->
    <div id="form-name" style="display:none">
      <div class="field">
        <label>Customer Name</label>
        <input type="text" id="name-input" placeholder="e.g. Miracle Udoh" autocomplete="off">
      </div>
    </div>

    <p class="err" id="input-err">Please enter a valid value</p>
    <button class="btn btn-gold" id="checkin-btn" onclick="doCheckin()">Check In Customer →</button>
    <div class="staff-tag"><span>Powered by Brandas</span></div>
  </div>

  <!-- SCREEN 2: RESULT -->
  <div class="screen" id="screen2">
    <div id="result-content"></div>
    <button class="btn btn-gold" onclick="newCheckin()">Check In Another →</button>
  </div>

</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5x5xI_K-B9b9iqa2tHJF1g0DL_guG3wO8X0r5YglDquYEJ4m2urEXn3qAi1d7WED-/exec';
var currentTab = 'phone';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-phone').classList.toggle('active', tab === 'phone');
  document.getElementById('tab-name').classList.toggle('active', tab === 'name');
  document.getElementById('form-phone').style.display = tab === 'phone' ? 'block' : 'none';
  document.getElementById('form-name').style.display = tab === 'name' ? 'block' : 'none';
  document.getElementById('input-err').style.display = 'none';
}

function doCheckin() {
  var payload = {};
  document.getElementById('input-err').style.display = 'none';

  if (currentTab === 'phone') {
    var raw = document.getElementById('phone-input').value.trim();
    if (raw.length < 10) {
      document.getElementById('input-err').textContent = 'Please enter a valid phone number';
      document.getElementById('input-err').style.display = 'block';
      return;
    }
    var phone = '234' + raw.replace(/^0/, '');
    payload = { type: 'checkin', searchBy: 'phone', phone: phone };
  } else {
    var name = document.getElementById('name-input').value.trim();
    if (name.length < 2) {
      document.getElementById('input-err').textContent = 'Please enter the customer name';
      document.getElementById('input-err').style.display = 'block';
      return;
    }
    payload = { type: 'checkin', searchBy: 'name', name: name };
  }

  var btn = document.getElementById('checkin-btn');
  btn.innerHTML = 'Checking in... <span class="spin"></span>';
  btn.disabled = true;

  var xhr = new XMLHttpRequest();
  xhr.open('POST', SCRIPT_URL, true);
  xhr.setRequestHeader('Content-Type', 'text/plain');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      btn.innerHTML = 'Check In Customer →';
      btn.disabled = false;
      try {
        var res = JSON.parse(xhr.responseText);
        showResult(res);
      } catch(e) {
        showResult({ success: false });
      }
    }
  };
  xhr.onerror = function() {
    btn.innerHTML = 'Check In Customer →';
    btn.disabled = false;
    showResult({ success: false });
  };
  xhr.send(JSON.stringify(payload));
}

function showResult(res) {
  var html = '';
  if (res.found === true) {
    html = '<div class="result-box found">' +
      '<div class="result-icon">✅</div>' +
      '<div class="result-name green">' + res.name + '</div>' +
      '<div class="result-detail">Visit logged successfully.<br>Last visit updated to today.</div>' +
      (res.food ? '<div class="result-food">🍛 ' + res.food + '</div>' : '') +
      '<div class="visit-badge">✓ Check-in complete</div>' +
      '</div>';
  } else if (res.found === false) {
    html = '<div class="result-box not-found">' +
      '<div class="result-icon">⚠️</div>' +
      '<div class="result-name red">Not Registered</div>' +
      '<div class="result-detail">This customer is not in the system.<br>Ask them to fill the signup form first.</div>' +
      '</div>';
  } else {
    html = '<div class="result-box error">' +
      '<div class="result-icon">❌</div>' +
      '<div class="result-name red">Error</div>' +
      '<div class="result-detail">Could not reach the system.<br>Check your connection and try again.</div>' +
      '</div>';
  }
  document.getElementById('result-content').innerHTML = html;
  goToScreen('screen2');
}

function newCheckin() {
  document.getElementById('phone-input').value = '';
  document.getElementById('name-input').value = '';
  document.getElementById('input-err').style.display = 'none';
  goToScreen('screen1');
}

function goToScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('screen1').classList.contains('active')) doCheckin();
  }
});
</script>
</body>
</html>
