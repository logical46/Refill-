<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Refill — Never Lose a Customer Again</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #1A472A;
      --green-mid: #2D6A4F;
      --green-light: #52B788;
      --gold: #D4AF37;
      --dark: #080808;
      --dark2: #0f0f0f;
      --dark3: #1a1a1a;
      --white: #ffffff;
      --grey: #888888;
      --grey-light: #cccccc;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      width: 100%;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      padding: 18px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8, 8, 8, 0.93);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--green-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: clamp(16px, 3vw, 36px);
      list-style: none;
    }

    .nav-links a {
      color: var(--grey);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--green-light), var(--green-mid));
      color: #000;
      padding: 10px 20px;
      border: none;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(82, 183, 136, 0.3);
    }

    /* HERO */
    .hero {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 130px 5% 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(26,71,42,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(212,175,55,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 30% 30% at 20% 80%, rgba(82,183,136,0.07) 0%, transparent 60%);
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(82,183,136,0.1);
      border: 1px solid rgba(82,183,136,0.3);
      border-radius: 100px;
      padding: 8px 20px;
      font-size: clamp(9px, 1.5vw, 11px);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: 36px;
      animation: fadeUp 0.8s ease both;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--green-light);
      border-radius: 50%;
      animation: blink 2s infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(38px, 7vw, 96px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -2px;
      margin-bottom: 28px;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .t1 {
      display: block;
      color: var(--white);
    }

    .t2 {
      display: block;
      background: linear-gradient(135deg, var(--green-light) 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(13px, 2vw, 17px);
      color: var(--grey);
      max-width: 520px;
      line-height: 1.75;
      margin-bottom: 44px;
      font-weight: 300;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green-light), var(--green-mid));
      color: #000;
      padding: 16px 36px;
      border: none;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-size: clamp(11px, 1.5vw, 13px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 32px rgba(82,183,136,0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(82,183,136,0.35);
    }

    .btn-secondary {
      background: none;
      color: var(--grey);
      padding: 16px 36px;
      border: 1px solid #2a2a2a;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-size: clamp(11px, 1.5vw, 13px);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-secondary:hover {
      border-color: #444;
      color: var(--white);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(20px, 5vw, 64px);
      justify-content: center;
      margin-top: 72px;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--green-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-lbl {
      font-size: clamp(9px, 1.2vw, 11px);
      letter-spacing: 2px;
      color: var(--grey);
      text-transform: uppercase;
      margin-top: 6px;
    }
